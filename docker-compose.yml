version: '3.8'

services:

  auth-postgres:
    image: postgres:16-alpine
    container_name: campusflow-auth-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    networks:
      - campusflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  annonces-postgres:
    image: postgres:16-alpine
    container_name: campusflow-annonces-postgres
    environment:
      POSTGRES_DB: annonces_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - annonces-postgres-data:/var/lib/postgresql/data
    networks:
      - campusflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d annonces_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  evenements-postgres:
    image: postgres:16-alpine
    container_name: campusflow-evenements-postgres
    environment:
      POSTGRES_DB: evenements_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - evenements-postgres-data:/var/lib/postgresql/data
    networks:
      - campusflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evenements_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  sociale-postgres:
    image: postgres:16-alpine
    container_name: campusflow-sociale-postgres
    environment:
      POSTGRES_DB: sociale_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - sociale-postgres-data:/var/lib/postgresql/data
    networks:
      - campusflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sociale_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka
  kafka:
    image: bitnami/kafka:3.6
    container_name: campusflow-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    networks:
      - campusflow-network
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

    # Eureka Server - doit démarrer avant les autres services
  discovery-service:
    build: ./discovery-service
    container_name: campusflow-discovery
    ports:
      - "8761:8761"
    networks:
      - campusflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Point d'entrée unique pour le frontend
  gateway-service:
    build: ./gateway-service
    container_name: campusflow-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - campusflow-network

  auth-service:
    build: ./auth-service
    container_name: campusflow-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: 5df470f521a95c3c95745098415f22716d087f4e4cb64481c0a0e643f74c2e95
    depends_on:
      auth-postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - campusflow-network

  annonces-service:
    build: ./annonces-service
    container_name: campusflow-annonces
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://annonces-postgres:5432/annonces_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: 5df470f521a95c3c95745098415f22716d087f4e4cb64481c0a0e643f74c2e95
    depends_on:
      annonces-postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - campusflow-network

  evenements-service:
    build: ./evenements-service
    container_name: campusflow-evenements
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://evenements-postgres:5432/evenements_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: 5df470f521a95c3c95745098415f22716d087f4e4cb64481c0a0e643f74c2e95
    depends_on:
      evenements-postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - campusflow-network

  sociale-service:
    build: ./sociale-service
    container_name: campusflow-sociale
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://sociale-postgres:5432/sociale_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: 5df470f521a95c3c95745098415f22716d087f4e4cb64481c0a0e643f74c2e95
    depends_on:
      sociale-postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - campusflow-network

  # Frontend React servi par Nginx
  frontend:
    build: ./frontend
    container_name: campusflow-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway-service
    networks:
      - campusflow-network

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: campusflow-prometheus
    volumes:
      - ./helm/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - campusflow-network

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: campusflow-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./helm/monitoring/grafana/provisioning:/etc/grafana/provisioning

    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - campusflow-network

volumes:
  auth-postgres-data:
  annonces-postgres-data:
  evenements-postgres-data:
  sociale-postgres-data:
  prometheus-data:
  grafana-data:

networks:
  campusflow-network:
    driver: bridge
