name: Deploy to K3s VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./auth-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campusflow-auth:latest

      - name: Build and Push Annonces Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./annonces-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campusflow-annonces:latest

      - name: Build and Push Evenements Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./evenements-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campusflow-evenements:latest

      - name: Build and Push Sociale Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sociale-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campusflow-sociale:latest

      - name: Build and Push Gateway Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campusflow-gateway:latest

      - name: Build and Push Discovery Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./discovery-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campusflow-discovery:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/campusflow-frontend:latest

