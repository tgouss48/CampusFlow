global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'annonces-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['annonces-service:8082']

  - job_name: 'evenements-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['evenements-service:8083']

  - job_name: 'sociale-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sociale-service:8084']

  - job_name: 'gateway-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway-service:8080']

  - job_name: 'discovery-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['discovery-service:8761']
