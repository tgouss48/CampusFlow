{{- $user := .Values.dockerUsername -}}
{{- $tag := .Values.imageTag -}}

# Discovery Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
spec:
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
      - name: discovery-service
        image: {{ $user }}/campusflow-discovery:{{ $tag }}
        envFrom:
        - configMapRef:
            name: campusflow-config
        - secretRef:
            name: campusflow-secrets
        ports:
        - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
spec:
  type: ClusterIP
  selector:
    app: discovery-service
  ports:
  - port: 8761


---
# Gateway Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: {{ $user }}/campusflow-gateway:{{ $tag }}
        envFrom:
        - configMapRef:
            name: campusflow-config
        - secretRef:
            name: campusflow-secrets
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://discovery-service:8761/eureka/
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: ClusterIP
  selector:
    app: gateway-service
  ports:
  - port: 8080


---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: {{ $user }}/campusflow-auth:{{ $tag }}
        envFrom:
        - configMapRef:
            name: campusflow-config
        - secretRef:
            name: campusflow-secrets
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: campusflow-config
              key: AUTH_DB_URL


        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: campusflow-secrets
              key: AUTH_DB_PASSWORD
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://discovery-service:8761/eureka/
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - port: 8081
---
