spring.application.name=auth-service
server.port=${AUTH_PORT}
server.forward-headers-strategy=framework

# Database
spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=ERROR

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus

# Security Properties
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-expiration=${AUTH_JWT_ACCESS_EXP}
app.security.jwt.refresh-token-expiration=${AUTH_JWT_REFRESH_EXP}
app.security.refresh-cookie.name=${AUTH_REFRESH_COOKIE_NAME}
app.security.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE}
app.security.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAMESITE}
app.security.refresh-cookie.path=${AUTH_REFRESH_COOKIE_PATH}
app.security.allowed-origins=${AUTH_ALLOWED_ORIGINS}
app.security.verification.token-expiration=${AUTH_VERIFICATION_EXP}
app.security.password-reset.token-expiration=${AUTH_PW_RESET_EXP}
app.security.mail.from=${AUTH_MAIL_FROM}
app.security.mail.frontend-base-url=${AUTH_FRONTEND_URL}

# Rate Limiting
app.security.rate-limiting.max-requests=${AUTH_RATE_LIMIT_MAX}
app.security.rate-limiting.window=${AUTH_RATE_LIMIT_WINDOW}
app.security.rate-limiting.cleanup-interval-ms=${AUTH_RATE_LIMIT_CLEANUP_MS}

# Kafka Topics
app.security.kafka.topics.user-profile-updates=${TOPIC_USER_PROFILE_UPDATES}

# Scheduling
app.security.scheduling.purge-expired-tokens-cron=0 0 * * * *
app.security.scheduling.purge-account-tokens-cron=0 */30 * * * *

# Mail Config
spring.mail.host=${AUTH_SMTP_HOST}
spring.mail.port=${AUTH_SMTP_PORT}
spring.mail.username=${AUTH_SMTP_USER}
spring.mail.password=${AUTH_SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${AUTH_SMTP_SSL_TRUST}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Kafka Global
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=AWS_MSK_IAM
spring.kafka.properties.sasl.jaas.config=software.amazon.msk.auth.iam.IAMLoginModule required;
spring.kafka.properties.sasl.client.callback.handler.class=software.amazon.msk.auth.iam.IAMClientCallbackHandler
